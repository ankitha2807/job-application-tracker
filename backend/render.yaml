services:
  - type: web
    name: job-tracker-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    
    envVars:
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: com.mysql.cj.jdbc.Driver
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.MySQLDialect
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 8080

databases:
  - name: job_tracker_db
    databaseName: job_tracker_db
    plan: starter
    ipWhitelist: []
